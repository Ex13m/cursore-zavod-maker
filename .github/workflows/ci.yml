name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - 'factory/data/**' # коммиты дропов не гоняют CI
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Factory smoke (deterministic produce)
        run: |
          node factory/trends.js
          node factory/produce.js --force
